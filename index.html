<!DOCTYPE html>
<html lang="en" data-theme="">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>

    <!-- Favicon -->
    <link rel="shortcut icon" href="./assests/job-favicon.png" type="image/x-icon">

    <!-- daisyUI + Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- all themes from daisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS Style -->
    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen w-9/12 mx-auto bg-[#F8FAFC]">
    <header class="pt-10 space-y-5">
        <!-- job-title -->
        <h1 class="text-4xl text-[#002C5C] font-bold">
            Job Application Tracker
        </h1>

        <!-- score-cards -->
        <div class="grid grid-cols-3 gap-4">
            <!-- card-1 -->
            <div class="bg-white p-5 border border-gray-200 rounded-xl">
                <p class="text-[#323B49] font-semibold text-xl">
                    Total
                </p>
                <p class="text-[#002C5C] font-semibold text-lg">
                    0
                </p>
            </div>

            <!-- card-2 -->
            <div class="bg-white p-5 border border-gray-200 rounded-xl">
                <p class="text-[#323B49] font-semibold text-xl">
                    Interview
                </p>
                <p class="text-success font-semibold text-lg">
                    0
                </p>
            </div>

            <!-- card-3 -->
            <div class="bg-white p-5 border border-gray-200 rounded-xl">
                <p class="text-[#323B49] font-semibold text-xl">
                    Rejected
                </p>
                <p class="text-error font-semibold text-lg">
                    0
                </p>
            </div>
        </div>
    </header>
</body>

</html>
